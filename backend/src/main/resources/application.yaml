spring:
  application:
    name: archive
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/secure_archive?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        "[hibernate.format_sql]": true
  
server:
    port: 8000